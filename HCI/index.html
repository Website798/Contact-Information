<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Information</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="app">
    <div id="infoForm">
      <h2>Personal Information</h2>
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="text" id="address" placeholder="Address" required>
      <input type="number" id="age" placeholder="Age" required>
      <select id="gender" required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <input type="file" id="photo" accept="image/*">

      <h2 class="emergency-title">Guardian Information</h2>
      <input type="text" id="guardianName" placeholder="Guardian Name" required>
      <input type="text" id="guardianAddress" placeholder="Guardian Address" required>
      <input type="text" id="guardianPhone" placeholder="Guardian Phone Number" required>
      <input type="text" id="guardianFacebook" placeholder="Guardian Facebook">

      <h2 class="emergency-title">Health Concerns</h2>
      <textarea id="healthConcerns" placeholder="List allergies, conditions, medications"></textarea>

      <h2 class="emergency-title">Emergency Contacts</h2>
      <div class="contact-block">
        <input type="text" id="contact1Name" placeholder="Contact 1 Name">
        <input type="text" id="contact1Phone" placeholder="Contact 1 Phone">
        <input type="text" id="contact1Address" placeholder="Contact 1 Address">
      </div>
      <div class="contact-block">
        <input type="text" id="contact2Name" placeholder="Contact 2 Name">
        <input type="text" id="contact2Phone" placeholder="Contact 2 Phone">
        <input type="text" id="contact2Address" placeholder="Contact 2 Address">
      </div>
      <div class="contact-block">
        <input type="text" id="contact3Name" placeholder="Contact 3 Name">
        <input type="text" id="contact3Phone" placeholder="Contact 3 Phone">
        <input type="text" id="contact3Address" placeholder="Contact 3 Address">
      </div>

      <button onclick="generateQR()">Generate QR Code</button>
    </div>

    <div id="qrSection" style="display:none;">
      <h2 class="emergency-title">FOR EMERGENCY USE</h2>
      <div id="qrcode"></div>
      <p class="qr-label">Scan for Emergency Info</p>
      <button onclick="downloadQR()">Download QR Code</button>
      <button onclick="goBack()">Edit Information</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
